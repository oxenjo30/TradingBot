<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>License Activation &mdash; TradeBot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/static/styles.css?v=185">
  <style>
    body { background:#080D14; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .lic-card { background:rgba(17,24,39,0.92); border:1px solid #1E2D45; border-radius:16px; padding:2.5rem; width:100%; max-width:440px; }
    .lic-logo { display:flex; align-items:center; gap:.75rem; margin-bottom:2rem; justify-content:center; }
    .lic-logo-mark { width:36px; height:36px; background:linear-gradient(135deg,#3B82F6,#8B5CF6); border-radius:8px; display:flex; align-items:center; justify-content:center; }
    .lic-title { font-size:20px; font-weight:700; color:#E6EBF5; text-align:center; margin-bottom:.4rem; }
    .lic-sub { font-size:13px; color:#94A3B8; text-align:center; margin-bottom:1.75rem; }
    .lic-label { font-size:11px; color:#94A3B8; text-transform:uppercase; letter-spacing:.06em; margin-bottom:.4rem; }
    .lic-input { width:100%; background:#0D1117; border:1px solid #1E2D45; border-radius:8px; padding:.7rem 1rem; color:#E6EBF5; font-size:13px; font-family:'Inter',monospace; outline:none; transition:border-color .15s; box-sizing:border-box; }
    .lic-input:focus { border-color:#3B82F6; }
    .lic-btn { width:100%; margin-top:1.25rem; padding:.75rem; background:#3B82F6; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:background .15s; }
    .lic-btn:hover { background:#2563EB; }
    .lic-btn:disabled { background:#1E2D45; color:#64748B; cursor:not-allowed; }
    .lic-msg { margin-top:.75rem; font-size:12px; text-align:center; min-height:18px; }
    .lic-ok  { color:#10B981; }
    .lic-err { color:#EF4444; }
    .lic-info { margin-top:1.5rem; background:#0D1829; border:1px solid #1E3A5F; border-radius:8px; padding:1rem; font-size:12px; color:#94A3B8; line-height:1.6; }
    .lic-info a { color:#3B82F6; text-decoration:none; }
    .lic-machine { margin-top:.5rem; font-size:11px; color:#475569; text-align:center; word-break:break-all; }
  </style>
</head>
<body>
  <div class="lic-card">
    <div class="lic-logo">
      <div class="lic-logo-mark">
        <svg width="18" height="18" viewBox="0 0 22 22" fill="none">
          <path d="M11 2L20 7.5V14.5L11 20L2 14.5V7.5L11 2Z" fill="url(#lg)"/>
          <defs><linearGradient id="lg" x1="2" y1="2" x2="20" y2="20">
            <stop stop-color="#3B82F6"/><stop offset="1" stop-color="#8B5CF6"/>
          </linearGradient></defs>
        </svg>
      </div>
      <span style="font-size:18px;font-weight:700;color:#E6EBF5;">TradeBot</span>
    </div>
    <div class="lic-title">License Activation Required</div>
    <div class="lic-sub">Enter your license key to activate TradeBot on this machine.</div>

    <div class="lic-label">License Key</div>
    <input id="key-input" class="lic-input" type="text" placeholder="Paste your license key here&hellip;" autocomplete="off" spellcheck="false">
    <button id="activate-btn" class="lic-btn">Activate License</button>
    <div id="msg" class="lic-msg"></div>

    <div class="lic-info">
      <b style="color:#E6EBF5;">Don&rsquo;t have a license key?</b><br>
      Purchase TradeBot to receive your license key via email.<br><br>
      Your license key is tied to this machine. To transfer to another PC, contact support.
    </div>
    <div class="lic-machine" id="machine-id-display"></div>
  </div>

  <script>
    const btn   = document.getElementById('activate-btn');
    const input = document.getElementById('key-input');
    const msg   = document.getElementById('msg');

    async function fetchMachineId() {
      try {
        const r = await fetch('/api/license/status');
        const d = await r.json();
        if (d.machine_id && d.machine_id !== 'ANY') {
          document.getElementById('machine-id-display').textContent = 'Machine ID: ' + d.machine_id.slice(0,16) + '&hellip;';
        }
      } catch {}
    }
    fetchMachineId();

    btn.addEventListener('click', async () => {
      const key = input.value.trim();
      if (!key) { msg.textContent = 'Please paste your license key.'; msg.className = 'lic-msg lic-err'; return; }
      btn.disabled = true; btn.textContent = 'Activating&hellip;';
      msg.textContent = ''; msg.className = 'lic-msg';
      try {
        const r = await fetch('/api/license/activate', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({key})
        });
        const d = await r.json();
        if (r.ok && d.valid) {
          msg.textContent = '✓ Activated! ' + d.days_remaining + ' days remaining. Redirecting&hellip;';
          msg.className = 'lic-msg lic-ok';
          setTimeout(() => { location.href = '/static/login.html'; }, 1500);
        } else {
          msg.textContent = d.detail || d.reason || 'Invalid license key.';
          msg.className = 'lic-msg lic-err';
        }
      } catch {
        msg.textContent = 'Network error. Is the server running?';
        msg.className = 'lic-msg lic-err';
      } finally {
        btn.disabled = false; btn.textContent = 'Activate License';
      }
    });

    input.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
  </script>
</body>
</html>
