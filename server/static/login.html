<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TradeBot &mdash; Sign In</title>
<link rel="icon" href="data:,">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #060d1a;
    --card: rgba(15, 25, 45, 0.85);
    --border: rgba(91, 141, 239, 0.18);
    --accent: #5b8def;
    --accent2: #3dd6f5;
    --green: #16c784;
    --red: #ea3943;
    --text: #e2eaf8;
    --mute: #4a6080;
    --input-bg: rgba(0,0,0,0.35);
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
  }

  /* -€-€ Animated background -€-€ */
  .bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* Gradient orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb-1 { width: 520px; height: 520px; background: #5b8def; top: -120px; left: -100px; animation-delay: 0s; }
  .orb-2 { width: 400px; height: 400px; background: #16c784; bottom: -80px; right: -60px; animation-delay: -4s; }
  .orb-3 { width: 300px; height: 300px; background: #3dd6f5; top: 40%; left: 55%; animation-delay: -8s; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, 20px) scale(1.08); }
  }

  /* -€-€ SVG chart background -€-€ */
  .chart-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.07;
  }

  .chart-line {
    fill: none;
    stroke: #5b8def;
    stroke-width: 2;
    stroke-dasharray: 2000;
    stroke-dashoffset: 2000;
    animation: draw-line 4s ease forwards;
  }
  .chart-fill {
    opacity: 0.5;
    animation: fade-fill 4s ease forwards;
  }
  @keyframes draw-line {
    to { stroke-dashoffset: 0; }
  }
  @keyframes fade-fill {
    from { opacity: 0; }
    to   { opacity: 0.5; }
  }

  /* Candlestick grid */
  .candle-group { animation: fade-in 1.5s ease forwards; opacity: 0; }
  .candle-group:nth-child(1)  { animation-delay: 0.1s; }
  .candle-group:nth-child(2)  { animation-delay: 0.2s; }
  .candle-group:nth-child(3)  { animation-delay: 0.3s; }
  .candle-group:nth-child(4)  { animation-delay: 0.4s; }
  .candle-group:nth-child(5)  { animation-delay: 0.5s; }
  .candle-group:nth-child(6)  { animation-delay: 0.6s; }
  .candle-group:nth-child(7)  { animation-delay: 0.7s; }
  .candle-group:nth-child(8)  { animation-delay: 0.8s; }
  .candle-group:nth-child(9)  { animation-delay: 0.9s; }
  .candle-group:nth-child(10) { animation-delay: 1.0s; }
  .candle-group:nth-child(11) { animation-delay: 1.1s; }
  .candle-group:nth-child(12) { animation-delay: 1.2s; }

  @keyframes fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* -€-€ Card -€-€ */
  .card {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    margin: 1rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 2.75rem 2.5rem 2.25rem;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow:
      0 0 0 1px rgba(91,141,239,0.08),
      0 32px 64px rgba(0,0,0,0.5),
      0 0 80px rgba(91,141,239,0.06);
    animation: card-in 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
    opacity: 0;
    transform: translateY(24px);
  }
  @keyframes card-in {
    to { opacity: 1; transform: translateY(0); }
  }

  /* -€-€ Logo -€-€ */
  .logo { text-align: center; margin-bottom: 2.25rem; }
  .logo-icon {
    width: 64px; height: 64px;
    margin: 0 auto 1rem;
    background: linear-gradient(135deg, #1a3a6e 0%, #0d1f40 100%);
    border: 1px solid rgba(91,141,239,0.3);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(91,141,239,0.2), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .logo-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .logo-sub {
    font-size: 0.8rem;
    color: var(--mute);
    margin-top: 0.3rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* -€-€ Stats strip -€-€ */
  .stats-strip {
    display: flex;
    gap: 1px;
    margin-bottom: 2rem;
    background: var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .stat {
    flex: 1;
    background: rgba(0,0,0,0.25);
    padding: 0.6rem 0.5rem;
    text-align: center;
  }
  .stat-val { font-size: 0.75rem; font-weight: 600; }
  .stat-lbl { font-size: 0.65rem; color: var(--mute); margin-top: 1px; text-transform: uppercase; letter-spacing: .04em; }
  .green { color: var(--green); }
  .red   { color: var(--red); }
  .blue  { color: var(--accent); }

  /* -€-€ Form -€-€ */
  .field { margin-bottom: 1.25rem; }
  .field label {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--mute);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.5rem;
  }
  .field input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid rgba(91,141,239,0.2);
    border-radius: 12px;
    color: var(--text);
    font-size: 0.95rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    font-family: inherit;
  }
  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(91,141,239,0.12);
  }
  .field input::placeholder { color: #2a3a55; }

  /* -€-€ Error -€-€ */
  .error-box {
    background: rgba(234,57,67,0.08);
    border: 1px solid rgba(234,57,67,0.3);
    border-radius: 10px;
    color: #f87b82;
    font-size: 0.82rem;
    padding: 0.7rem 1rem;
    margin-bottom: 1.25rem;
    display: none;
    animation: shake 0.4s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60%  { transform: translateX(-5px); }
    40%,80%  { transform: translateX(5px); }
  }

  /* -€-€ Button -€-€ */
  .sign-btn {
    width: 100%;
    padding: 0.85rem;
    background: linear-gradient(135deg, #5b8def 0%, #3a6fd8 100%);
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(91,141,239,0.35);
    font-family: inherit;
  }
  .sign-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(91,141,239,0.45); }
  .sign-btn:active { transform: translateY(0); }
  .sign-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer-link {
    display: block;
    text-align: center;
    margin-top: 1.25rem;
    font-size: 0.78rem;
    color: var(--mute);
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer-link:hover { color: var(--accent); }

  /* -€-€ Ticker tape -€-€ */
  .ticker-wrap {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 5;
    background: rgba(6,13,26,0.8);
    border-top: 1px solid rgba(91,141,239,0.1);
    overflow: hidden;
    padding: 6px 0;
  }
  .ticker {
    display: flex;
    gap: 3rem;
    animation: ticker-scroll 28s linear infinite;
    white-space: nowrap;
  }
  .tick-item { font-size: 11px; display: flex; gap: 6px; align-items: center; }
  .tick-sym  { color: #8aa3c0; font-weight: 600; }
  @keyframes ticker-scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
</style>
</head>
<body>

<!-- Animated background -->
<div class="bg-canvas">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- SVG candlestick chart -->
  <svg class="chart-bg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#5b8def" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#5b8def" stop-opacity="0"/>
      </linearGradient>
    </defs>

    <!-- Price line -->
    <path class="chart-fill" d="M0,580 C80,540 160,520 240,490 C320,460 400,430 480,410 C560,390 640,420 720,380 C800,340 880,300 960,280 C1040,260 1120,290 1200,260 C1280,230 1360,210 1440,190 L1440,900 L0,900 Z" fill="url(#lineGrad)"/>
    <path class="chart-line" d="M0,580 C80,540 160,520 240,490 C320,460 400,430 480,410 C560,390 640,420 720,380 C800,340 880,300 960,280 C1040,260 1120,290 1200,260 C1280,230 1360,210 1440,190"/>

    <!-- Candlesticks -->
    <g opacity="0.6">
      <g class="candle-group"><line x1="100" y1="530" x2="100" y2="610" stroke="#16c784" stroke-width="1.5"/><rect x="90" y="545" width="20" height="45" fill="#16c784" rx="2"/></g>
      <g class="candle-group"><line x1="180" y1="495" x2="180" y2="575" stroke="#16c784" stroke-width="1.5"/><rect x="170" y="505" width="20" height="50" fill="#16c784" rx="2"/></g>
      <g class="candle-group"><line x1="340" y1="445" x2="340" y2="510" stroke="#16c784" stroke-width="1.5"/><rect x="330" y="455" width="20" height="40" fill="#16c784" rx="2"/></g>
      <g class="candle-group"><line x1="500" y1="395" x2="500" y2="465" stroke="#16c784" stroke-width="1.5"/><rect x="490" y="405" width="20" height="45" fill="#16c784" rx="2"/></g>
      <g class="candle-group"><line x1="740" y1="355" x2="740" y2="420" stroke="#16c784" stroke-width="1.5"/><rect x="730" y="365" width="20" height="40" fill="#16c784" rx="2"/></g>
      <g class="candle-group"><line x1="900" y1="275" x2="900" y2="345" stroke="#16c784" stroke-width="1.5"/><rect x="890" y="285" width="20" height="45" fill="#16c784" rx="2"/></g>
      <g class="candle-group"><line x1="1060" y1="255" x2="1060" y2="315" stroke="#16c784" stroke-width="1.5"/><rect x="1050" y="265" width="20" height="36" fill="#16c784" rx="2"/></g>
      <g class="candle-group"><line x1="1220" y1="230" x2="1220" y2="300" stroke="#16c784" stroke-width="1.5"/><rect x="1210" y="240" width="20" height="45" fill="#16c784" rx="2"/></g>
      <g class="candle-group"><line x1="260" y1="490" x2="260" y2="560" stroke="#ea3943" stroke-width="1.5"/><rect x="250" y="495" width="20" height="40" fill="#ea3943" rx="2"/></g>
      <g class="candle-group"><line x1="420" y1="420" x2="420" y2="490" stroke="#ea3943" stroke-width="1.5"/><rect x="410" y="430" width="20" height="35" fill="#ea3943" rx="2"/></g>
      <g class="candle-group"><line x1="620" y1="400" x2="620" y2="465" stroke="#ea3943" stroke-width="1.5"/><rect x="610" y="410" width="20" height="38" fill="#ea3943" rx="2"/></g>
      <g class="candle-group"><line x1="820" y1="310" x2="820" y2="375" stroke="#ea3943" stroke-width="1.5"/><rect x="810" y="315" width="20" height="42" fill="#ea3943" rx="2"/></g>
    </g>

    <!-- Grid lines -->
    <g stroke="rgba(91,141,239,0.08)" stroke-width="1">
      <line x1="0" y1="200" x2="1440" y2="200"/>
      <line x1="0" y1="350" x2="1440" y2="350"/>
      <line x1="0" y1="500" x2="1440" y2="500"/>
      <line x1="0" y1="650" x2="1440" y2="650"/>
    </g>
  </svg>
</div>

<!-- Login card -->
<div class="card">

  <div class="logo">
    <div class="logo-icon">
      <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
        <polyline points="4,26 10,18 16,22 22,10 30,8" stroke="#5b8def" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <polyline points="22,10 30,8" stroke="#16c784" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="30" cy="8" r="2.5" fill="#16c784"/>
        <line x1="4" y1="26" x2="30" y2="26" stroke="rgba(91,141,239,0.3)" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="logo-title">TradeBot</div>
    <div class="logo-sub">Automated Stock Trading</div>
  </div>

  <!-- Stat strip -->
  <div class="stats-strip" aria-hidden="true">
    <div class="stat">
      <div class="stat-val green">+2.41%</div>
      <div class="stat-lbl">SPY</div>
    </div>
    <div class="stat">
      <div class="stat-val green">+3.18%</div>
      <div class="stat-lbl">QQQ</div>
    </div>
    <div class="stat">
      <div class="stat-val red">-0.87%</div>
      <div class="stat-lbl">AAPL</div>
    </div>
    <div class="stat">
      <div class="stat-val green">+5.22%</div>
      <div class="stat-lbl">NVDA</div>
    </div>
    <div class="stat">
      <div class="stat-val blue">7 Strat.</div>
      <div class="stat-lbl">Active</div>
    </div>
  </div>

  <div class="error-box" id="error-msg">
    <span id="error-text">Incorrect password &mdash; please try again</span>
  </div>

  <form id="login-form" onsubmit="doLogin(event)" autocomplete="on">
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password"
             autocomplete="current-password" autofocus required />
    </div>
    <button class="sign-btn" type="submit" id="login-btn">Sign In</button>
  </form>

  <p class="footer-link" style="cursor:default;">Forgot password? It can only be reset from the machine running TradeBot.</p>
</div>

<!-- Ticker tape -->
<div class="ticker-wrap" aria-hidden="true">
  <div class="ticker" id="ticker"></div>
</div>

<script>
const ticks = [
  {s:"AAPL", p:"$189.30", c:"+1.2%", up:true},
  {s:"MSFT", p:"$415.20", c:"+0.8%", up:true},
  {s:"NVDA", p:"$875.40", c:"+5.2%", up:true},
  {s:"AMZN", p:"$182.10", c:"-0.4%", up:false},
  {s:"GOOGL", p:"$172.50", c:"+1.1%", up:true},
  {s:"META", p:"$488.70", c:"+2.3%", up:true},
  {s:"TSLA", p:"$172.80", c:"-1.8%", up:false},
  {s:"SPY",  p:"$524.60", c:"+0.6%", up:true},
  {s:"QQQ",  p:"$449.20", c:"+0.9%", up:true},
  {s:"BRK.B",p:"$403.10", c:"+0.3%", up:true},
];
const tickerEl = document.getElementById('ticker');
[...ticks, ...ticks].forEach(t => {
  const item = document.createElement('span');
  item.className = 'tick-item';
  const sym = document.createElement('span'); sym.className = 'tick-sym'; sym.textContent = t.s;
  const price = document.createElement('span'); price.style.color = '#c8d6e8'; price.textContent = t.p;
  const chg = document.createElement('span'); chg.style.color = t.up ? '#16c784' : '#ea3943'; chg.textContent = t.c;
  item.append(sym, price, chg);
  tickerEl.appendChild(item);
});

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errBox = document.getElementById('error-msg');
  const pw = document.getElementById('password').value;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in&hellip;';
  errBox.style.display = 'none';

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    if (r.ok) {
      btn.innerHTML = '&#10003; Success';
      btn.style.background = 'linear-gradient(135deg,#16c784,#0fa066)';
      setTimeout(() => { window.location.href = '/static/index.html'; }, 400);
    } else {
      document.getElementById('error-text').textContent = 'Incorrect password — please try again';
      errBox.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  } catch {
    document.getElementById('error-text').textContent = 'Cannot reach server — is TradeBot running?';
    errBox.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = 'Sign In';
  }
}
</script>
</body>
</html>
